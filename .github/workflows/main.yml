name: Build Batman Doom PSP EBOOT

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: pspdev/pspdev:latest

    steps:
      - name: Install dependencies
        run: |
          apk update
          apk add --no-cache git cmake make python3 py3-pip bash zip
          pip3 install --break-system-packages Pillow || pip3 install Pillow || true

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clone doomgeneric
        run: git clone --depth 1 https://github.com/ozkl/doomgeneric.git

      - name: Clone Nuked OPL3
        run: git clone --depth 1 https://github.com/nukeykt/Nuked-OPL3.git

      - name: Copy project files into engine
        run: |
          cp doomgeneric_psp.c doomgeneric/doomgeneric/
          cp deh_loader.c doomgeneric/doomgeneric/
          cp deh_loader.h doomgeneric/doomgeneric/
          cp Nuked-OPL3/opl3.h doomgeneric/doomgeneric/
          cp Nuked-OPL3/opl3.c doomgeneric/doomgeneric/

      - name: Patch doomgeneric for PWAD compatibility
        run: |
          cd doomgeneric/doomgeneric

          # 1. Disable RANGECHECK (can crash on PWAD data)
          sed -i 's/^#define RANGECHECK/\/\/ #define RANGECHECK/' doomdef.h || true

          # 2. Inject DEH_LoadFromWADs() call after W_GenerateHashTable()
          python3 ${GITHUB_WORKSPACE}/scripts/patch_dehacked.py

          # 3. Expand sprite/flat namespace to cover ALL WADs (IWAD+PWAD)
          python3 ${GITHUB_WORKSPACE}/scripts/patch_sprite_range.py

          # 3b. Allow PWAD sprites to override IWAD sprites (no I_Error on duplicates)
          python3 ${GITHUB_WORKSPACE}/scripts/patch_sprite_override.py

          # 4. Fix R_DrawVisSprite: modular wrapping for PWAD sprites
          python3 -c "
          with open('r_things.c', 'r') as f:
              content = f.read()
          old = 'texturecolumn = frac>>FRACBITS;'
          new_code = 'texturecolumn = frac>>FRACBITS;\n          if (SHORT(patch->width) > 0) { texturecolumn = texturecolumn % SHORT(patch->width); if (texturecolumn < 0) texturecolumn += SHORT(patch->width); }'
          if old in content and 'texturecolumn % SHORT' not in content:
              content = content.replace(old, new_code, 1)
              print('Patched R_DrawVisSprite')
          else:
              print('R_DrawVisSprite patch skipped')
          with open('r_things.c', 'w') as f:
              f.write(content)
          "

          # 5. Safety: clamp dc_yl and dc_yh in R_DrawColumn
          python3 -c "
          with open('r_draw.c', 'r') as f:
              content = f.read()
          old = 'count = dc_yh - dc_yl;'
          new_code = 'if (dc_yl < 0) dc_yl = 0; if (dc_yh >= SCREENHEIGHT) dc_yh = SCREENHEIGHT - 1; count = dc_yh - dc_yl;'
          if old in content and 'if (dc_yl < 0)' not in content:
              content = content.replace(old, new_code, 1)
              print('Patched R_DrawColumn')
          else:
              print('R_DrawColumn patch skipped')
          with open('r_draw.c', 'w') as f:
              f.write(content)
          "

          # 6. PSP: fix any int/pointer size issues (MIPS 32-bit)
          # Ensure boolean is defined for doomgeneric on MIPS
          python3 -c "
          with open('doomtype.h', 'r') as f:
              content = f.read()
          if 'typedef enum' in content and 'boolean' in content and '_Bool' not in content:
              print('doomtype.h already has boolean typedef')
          with open('doomtype.h', 'w') as f:
              f.write(content)
          " || true

          echo "=== All patches applied ==="

      - name: Generate PSP icon
        run: |
          python3 -c "
          import os, struct, zlib
          os.makedirs('assets', exist_ok=True)

          def make_minimal_png(path, w=144, h=80):
              \"\"\"Create a minimal valid RGB PNG without PIL.\"\"\"
              raw = b''
              for y in range(h):
                  raw += b'\x00'  # filter none
                  for x in range(w):
                      raw += bytes([20, 20, 80])  # dark blue
              compressed = zlib.compress(raw)

              def chunk(ctype, data):
                  c = ctype + data
                  return struct.pack('>I', len(data)) + c + struct.pack('>I', zlib.crc32(c) & 0xFFFFFFFF)

              ihdr = struct.pack('>IIBBBBB', w, h, 8, 2, 0, 0, 0)
              with open(path, 'wb') as f:
                  f.write(b'\x89PNG\r\n\x1a\n')
                  f.write(chunk(b'IHDR', ihdr))
                  f.write(chunk(b'IDAT', compressed))
                  f.write(chunk(b'IEND', b''))

          icon = 'assets/ICON0.PNG'
          try:
              from PIL import Image
              if not os.path.exists(icon):
                  img = Image.new('RGB', (144, 80), (20, 20, 80))
                  img.save(icon)
                  print('Created icon with PIL')
              else:
                  img = Image.open(icon).convert('RGB').resize((144, 80))
                  img.save(icon)
                  print('Resized existing icon')
          except Exception:
              if not os.path.exists(icon):
                  make_minimal_png(icon)
                  print('Created icon with raw PNG fallback')
          " || echo "Icon generation had issues"
          ls -lh assets/ICON0.PNG || (echo "FATAL: No ICON0.PNG!"; exit 1)

      - name: Build
        run: |
          # psp-cmake is the official pspdev wrapper — sets toolchain automatically
          mkdir -p build && cd build
          psp-cmake .. -DCMAKE_BUILD_TYPE=Release
          make -j$(nproc) 2>&1 | tail -80

      - name: Verify output
        run: |
          ls -lh build/EBOOT.PBP || (echo "EBOOT.PBP not found!"; ls -lh build/; exit 1)
          echo "Build successful!"

      - name: Package for distribution
        run: |
          mkdir -p dist/PSP/GAME/BATDOOM
          cp build/EBOOT.PBP dist/PSP/GAME/BATDOOM/
          cat > dist/PSP/GAME/BATDOOM/README.txt << 'EOF'
          Batman Doom PSP Port
          ====================
          
          Place the following WAD files in this folder:
            doom2.wad   (Doom II IWAD - you must own this)
            batman.wad  (Batman Doom PWAD - free from idgames)
          
          Controls:
            Analog Nub        : Move forward/back, Strafe left/right
            D-Pad Left/Right  : Turn left/right
            Cross (X)         : Use / Open doors
            Square            : Fire
            Circle            : Strafe modifier (run-strafe)
            Triangle          : Automap
            R Trigger         : Fire
            L Trigger         : Run
            L+D-Pad L/R       : Cycle weapons
            L+D-Pad Up        : Quick Save (slot 0)
            L+D-Pad Down      : Quick Load (slot 0)
            Start             : Menu (Escape)
            Select            : Confirm/Enter
            L+R+Start         : Exit to XMB
          
          Debug log: ms0:/PSP/GAME/BATDOOM/debug.log
          EOF
          cd dist && zip -r ../BatmanDoomPSP.zip PSP/
          echo "Package created: BatmanDoomPSP.zip"

      - name: Upload EBOOT.PBP
        uses: actions/upload-artifact@v4
        with:
          name: BatmanDoomPSP-eboot
          path: build/EBOOT.PBP
          if-no-files-found: error

      - name: Upload full package
        uses: actions/upload-artifact@v4
        with:
          name: BatmanDoomPSP-package
          path: BatmanDoomPSP.zip
          if-no-files-found: warn
